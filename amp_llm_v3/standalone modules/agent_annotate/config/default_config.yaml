# Agent Annotate - Default Configuration
# ========================================
# This file defines the multi-model verification pipeline,
# research agents, annotation fields, and orchestrator settings.

verification:
  num_verifiers: 3
  require_consensus: true
  consensus_threshold: 0.67

  models:
    primary:
      name: "llama3.1:8b"
      role: annotator
    # Mac Mini verifiers — cognitive diversity via 3 different model families.
    # Each gets a different verification persona (conservative, evidence-strict, adversarial).
    verifier_1:
      name: "gemma2:9b"          # Google — conservative persona
      role: verifier
    verifier_2:
      name: "qwen2.5:7b"         # Alibaba (v2.5 gen upgrade) — evidence-strict persona
      role: verifier
    verifier_3:
      name: "phi4-mini:3.8b"     # Microsoft Phi-4 Mini — adversarial persona (fast, strong reasoning)
      role: verifier
    reconciliation:
      name: "qwen2.5:14b"
      role: reconciler

evidence_thresholds:
  classification:
    min_sources: 2
    min_quality: 0.5
  delivery_mode:
    min_sources: 2
    min_quality: 0.5
  outcome:
    min_sources: 2
    min_quality: 0.5
  reason_for_failure:
    min_sources: 1
    min_quality: 0.3
  peptide:
    min_sources: 2
    min_quality: 0.5

research_agents:
  clinical_protocol:
    sources:
      - clinicaltrials_gov
      - openfda
  literature:
    sources:
      - pubmed
      - pmc
      - pmc_bioc
  peptide_identity:
    sources:
      - uniprot
      - dramp
  web_context:
    sources:
      - duckduckgo
  dbaasp:
    sources:
      - dbaasp
  chembl:
    sources:
      - chembl
  rcsb_pdb:
    sources:
      - rcsb_pdb
  ebi_proteins:
    sources:
      - ebi_proteins
  apd:
    sources:
      - apd
  # dbamp: REMOVED v8 — server (yylab.jnu.edu.cn) permanently unreachable
  who_ictrp:
    sources:
      - who_ictrp
  iuphar:
    sources:
      - iuphar
  # intact: REMOVED v8 — 1/10 hit rate, mostly generic protein noise
  # card: REMOVED v8 — 0/10 hit rate, only relevant for AMR-specific trials
  pdbe:
    sources:
      - pdbe

annotation_agents:
  classification:
    primary_research: clinical_protocol
    secondary_research: literature
  delivery_mode:
    primary_research: clinical_protocol
    secondary_research: literature
  outcome:
    primary_research: clinical_protocol
    secondary_research: web_context
  reason_for_failure:
    primary_research: web_context
    secondary_research: literature
  peptide:
    primary_research: peptide_identity
    secondary_research: literature

orchestrator:
  max_retry_rounds: null
  parallel_research: true
  parallel_annotation: true
  # Hardware profile: "mac_mini" (16-24GB, sequential Ollama, smaller models)
  #                   "server"   (240+ GB RAM, premium models for high-accuracy tasks)
  # Controls model selection for classification/outcome (high-accuracy fields),
  # reconciliation, concurrency settings, and evidence limits.
  hardware_profile: "mac_mini"

  # Premium model for server profile — used for classification, outcome, and reconciliation.
  # These are the hardest tasks requiring strong multi-step reasoning.
  # Toggle between models by changing this single value:
  #   "kimi-k2-thinking"  — 1T MoE, 32B active. Proven reasoning (AIME 95.6%). Default.
  #   "minimax-m2.7"      — 2.3T MoE, 100B active. Strong task adherence (97%). ~3x slower.
  # Models are auto-pulled from Ollama if not available locally.
  server_premium_model: "kimi-k2-thinking"

  # Server verifier overrides — stronger models replace Mac Mini defaults.
  # Each gets a verification persona (conservative, evidence-strict, adversarial).
  # Auto-pulled from Ollama if not available locally.
  # Leave empty [] to use the default Mac Mini verifiers on server too.
  server_verifiers:
    - "gemma2:27b"            # verifier_1 (conservative) — 3x upgrade from 9b
    - "qwen2.5:32b"           # verifier_2 (evidence-strict) — 4.5x upgrade from 7b
    - "phi4:14b"              # verifier_3 (adversarial) — 3.7x upgrade from 3.8b

  # Server model selection summary:
  #   classification:  server_premium_model (decision tree requires strongest reasoning)
  #   outcome:         server_premium_model (nuanced literature interpretation)
  #   reconciler:      server_premium_model (resolves multi-model disagreements)
  #   peptide:         qwen2.5:14b (deterministic catches most cases)
  #   delivery_mode:   qwen2.5:14b (deterministic catches most cases)
  #   failure_reason:  qwen2.5:14b (depends on outcome, not independent)
  #   verifiers:       server_verifiers (above) — replaces Mac Mini defaults

ollama:
  host: localhost
  port: 11434
  timeout: 600
  temperature: 0.10
